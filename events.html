<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Events — Today's timothy</title>
  <meta name="description" content="Upcoming events and registration.">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-light bg-transparent py-3">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="index.html">Today's timothy</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center position-relative">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="galleryDropdown" role="button" data-bs-toggle="dropdown">
              Gallery
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="photo-gallery-catelogue.html">Photo Gallery</a></li>
              <li><a class="dropdown-item" href="video-gallery-catelogue.html">Video Gallery</a></li>
            </ul>
          </li>

          <li class="nav-item"><a class="nav-link active" href="events.html">Events</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About / Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="container py-5">

    <header class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h1 class="h3 mb-0">Upcoming Events</h1>
        <p class="text-muted small mb-0">Join our upcoming quizzes, workshops and meetups.</p>
      </div>
    </header>

    <!-- PAGINATION CONTROLS -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <button id="prevBtn" class="btn btn-outline-primary btn-sm">Prev</button>
        <button id="nextBtn" class="btn btn-outline-primary btn-sm">Next</button>
        <span class="ms-2" id="pageInfo"></span>
      </div>

      <div>
        <label class="me-2">Page Size:</label>
        <select id="pageSizeSelect" class="form-select d-inline-block w-auto">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="20">20</option>
        </select>
      </div>
    </div>

    <div id="loadingSpinner" class="text-center my-5" style="display:none;">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>

    <!-- EVENTS WILL BE LOADED HERE -->
    <div class="row g-4" id="eventsList"></div>

  </main>

  <!-- REGISTRATION MODAL -->
  <div class="modal fade" id="eventRegisterModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form id="eventRegisterForm" novalidate>
          <div class="modal-header">
            <h5 class="modal-title" id="eventRegisterLabel">Register for Event</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="eventNameInput" name="eventName">

            <div class="mb-3">
              <label class="form-label">First name</label>
              <input type="text" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Last name</label>
              <input type="text" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Phone</label>
              <input type="tel" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">Church / Group</label>
              <input type="text" class="form-control">
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-primary">Submit Registration</button>
          </div>

        </form>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>

<script>
  const API_URL = "https://ttc-gateway.runasp.net/api/ttc/events/upcoming";

let pageIndex = 1;
let pageSize = 10;
let totalPages = 1;

// fallback images from your existing assets
const fallbackImages = [
  "assets/images/event-1.svg",
  "assets/images/event-2.svg",
  "assets/images/event-3.svg"
];

const eventsList = document.getElementById("eventsList");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const pageInfo = document.getElementById("pageInfo");
const pageSizeSelect = document.getElementById("pageSizeSelect");
const loadingSpinner = document.getElementById("loadingSpinner");

async function fetchEvents() {
  const url = `${API_URL}?PageIndex=${pageIndex}&PageSize=${pageSize}&SortDescending=true`;

  try {
    showSpinner();

    const res = await fetch(url);
    const data = await res.json();

    if (!data.status) {
      eventsList.innerHTML = `<p class="text-danger">Failed to load events.</p>`;
      hideSpinner();
      return;
    }

    totalPages = data.metaData.totalPages;
    renderEvents(data.results);
    updatePaginationUI();
    hideSpinner();

  } catch (err) {
    console.error(err);
    eventsList.innerHTML = `<p class="text-danger">Error loading events.</p>`;
    hideSpinner();
  }
}

function renderEvents(events) {
  eventsList.innerHTML = "";

  if (!events || events.length === 0) {
    eventsList.innerHTML = `<p>No upcoming events.</p>`;
    return;
  }

  events.forEach((event, index) => {
    const imageUrl = event.bannerUrl ?? fallbackImages[index % fallbackImages.length];

    const col = document.createElement("div");
    col.className = "col-md-6 col-lg-4";

    col.innerHTML = `
      <div class="card event-card h-100 shadow-sm">
        <img src="${imageUrl}" class="card-img-top" alt="${event.name}">
        <div class="card-body">
          <h5 class="card-title">${event.name}</h5>
          <p class="text-muted small mb-2">
            <i class="fa fa-calendar me-2"></i>${event.startDate} · ${event.startTime}
          </p>
          <p class="card-text">${event.description}</p>
          <div class="d-flex justify-content-between align-items-center mt-3">
            <span class="text-muted small">Event ID: ${event.id}</span>
            <button class="btn btn-primary btn-sm" onclick="goToRegister('${event.id}')">
              Register
            </button>
          </div>
        </div>
      </div>
    `;

    eventsList.appendChild(col);
  });
}

function updatePaginationUI() {
  pageInfo.innerText = `Page ${pageIndex} of ${totalPages}`;
  prevBtn.disabled = pageIndex <= 1;
  nextBtn.disabled = pageIndex >= totalPages;
}

function showSpinner() {
  loadingSpinner.style.display = "block";
}

function hideSpinner() {
  loadingSpinner.style.display = "none";
}

function goToRegister(eventId) {
  window.location.href = `register.html?eventId=${encodeURIComponent(eventId)}`;
}

// Pagination handlers
prevBtn.addEventListener("click", () => {
  if (pageIndex > 1) {
    pageIndex--;
    fetchEvents();
  }
});

nextBtn.addEventListener("click", () => {
  if (pageIndex < totalPages) {
    pageIndex++;
    fetchEvents();
  }
});

pageSizeSelect.addEventListener("change", () => {
  pageSize = parseInt(pageSizeSelect.value);
  pageIndex = 1;
  fetchEvents();
});

// Initial load
fetchEvents();
</script>

</body>
</html>
