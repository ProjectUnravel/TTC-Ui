  <main class="container">
    <section class="form-section">
      <h1>Register</h1>
      <p>Register to participate in our Bible quizzes and activities.</p>


      <div class="row">
        <!-- EVENT CARD -->
        <div class="col-md-5">
          <div id="eventDetails" class="mb-4"></div>

          <div id="loadingSpinner" class="text-center my-4" style="display:none;">
            <div class="spinner-border text-primary"></div>
          </div>
        </div>

        <!-- FORM -->
        <div class="col-md-7">

          <form id="registerForm" class="register-form" novalidate>
            <div class="form-grid">
              <label for="lastName" class="field">
                <span class="field-label">Last name <span class="required">*</span></span>
                <input id="lastName" name="lastName" type="text" required placeholder=" ">
                <span class="field-icon"><i class="fa fa-exclamation-circle"></i></span>
                <!-- <div class="field-error" data-for="lastName">A name is required.</div> -->
              </label>

              <label for="firstName" class="field">
                <span class="field-label">First name <span class="required">*</span></span>
                <input id="firstName" name="firstName" type="text" required placeholder=" ">
                <span class="field-icon"><i class="fa fa-exclamation-circle"></i></span>
                <!-- <div class="field-error" data-for="firstName">A name is required.</div> -->
              </label>

              <label for="otherNames" class="field">
                <span class="field-label">Other names</span>
                <input id="otherNames" name="otherNames" type="text" placeholder=" ">
                <span class="field-icon"><i class="fa fa-exclamation-circle"></i></span>
                <div class="field-error" data-for="otherNames"></div>
              </label>

              <label for="email" class="field">
                <span class="field-label">Email address </span>
                <input id="email" name="email" type="email" required placeholder=" ">
                <!-- <span class="field-icon"><i class="fa fa-exclamation-circle"></i></span> -->
                <!-- <div class="field-error" data-for="email">Please enter a valid email address.</div> -->
              </label>

              <label for="phone" class="field">
                <span class="field-label">Phone number <span class="required">*</span></span>
                <input id="phone" name="phone" type="tel" pattern="[0-9+\- ()]{7,}" required placeholder=" ">
                <span class="field-icon"><i class="fa fa-exclamation-circle"></i></span>
                <!-- <div class="field-error" data-for="phone">A phone number is required.</div> -->
              </label>

              <label for="dob" class="field">
                <span class="field-label">Date of birth <span class="required">*</span></span>
                <input id="dob" name="dob" type="date" required placeholder=" ">
                <span class="field-icon"><i class="fa fa-exclamation-circle"></i></span>
                <!-- <div class="field-error" data-for="dob">Please select your date of birth.</div> -->
              </label>

              <label for="church" class="field">
                <span class="field-label">Church  <span class="required">*</span></span>
                <input id="church" name="church" type="text" required placeholder=" ">
                <span class="field-icon"><i class="fa fa-exclamation-circle"></i></span>
                <!-- <div class="field-error" data-for="church">Please enter your church or group.</div> -->
              </label>

              <label for="gender" class="field">
                <span class="field-label">Gender <span class="required">*</span></span>
                <select id="gender" name="gender" class="form-select" required>
                  <option value="">Select gender</option>
                  <option value="Female">Female</option>
                  <option value="Male">Male</option>
                </select>
                <span class="field-icon"><i class="fa fa-exclamation-circle"></i></span>
                <!-- <div class="field-error" data-for="gender">Select a gender.</div> -->
              </label>
            </div>

            <div id="submitSpinner" class="text-center my-3" style="display:none;">
              <div class="spinner-border text-primary"></div>
            </div>
            <div class="form-actions mt-4">
              <button class="btn btn-primary btn-lg" type="submit">Submit registration</button>
            </div>
          </form>
        </div>
      </div>

  <!-- REGISTRATION STATUS MODAL -->
  <div class="modal fade" id="statusModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="statusModalTitle">Registration Status</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="statusModalBody"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
        </div>
      </div>
    </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>

  <script>
    const dobInput = document.getElementById("dob");

    // Set min date = today (prevents future years)
    const today = new Date(2007, 3, 13).toISOString().split("T")[0];
    dobInput.min = today;

    const submitSpinner = document.getElementById("submitSpinner");

    function showSubmitSpinner() {
      submitSpinner.style.display = "block";
    }

    function hideSubmitSpinner() {
      submitSpinner.style.display = "none";
    }
  </script>

  <script>
    const EVENT_API_BASE = "https://ttc-gateway.runasp.net/api/ttc/events";
    const REGISTRATION_API = "https://ttc-gateway.runasp.net/api/ttc/eventregistrations";

    const eventDetailsDiv = document.getElementById("eventDetails");
    const loadingSpinner = document.getElementById("loadingSpinner");
    const registerForm = document.getElementById("registerForm");
    const submitButton = registerForm.querySelector("button[type='submit']");

    const statusModal = new bootstrap.Modal(document.getElementById("statusModal"));
    const statusModalTitle = document.getElementById("statusModalTitle");
    const statusModalBody = document.getElementById("statusModalBody");

    let currentEventId = null;

    // ---------- UTIL ----------
    function getEventIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("eventId");
    }

    function showSpinner() {
      loadingSpinner.style.display = "block";
    }

    function hideSpinner() {
      loadingSpinner.style.display = "none";
    }

    function disableSubmit() {
      submitButton.disabled = true;
    }

    function enableSubmit() {
      submitButton.disabled = false;
    }

    // ---------- FETCH EVENT ----------
    async function fetchEventDetails() {
      const eventId = getEventIdFromUrl();

      if (!eventId) {
        eventDetailsDiv.innerHTML = `<div class="alert alert-warning">No event selected.</div>`;
        disableSubmit();
        return;
      }

      try {
        showSpinner();

        const res = await fetch(`${EVENT_API_BASE}/${eventId}`);
        const data = await res.json();

        // Must check boolean status
        if (!data.status) {
          eventDetailsDiv.innerHTML = `<div class="alert alert-danger">Event not found.</div>`;
          disableSubmit();
          hideSpinner();
          return;
        }

        currentEventId = data.results.id;
        renderEventCard(data.results);
        enableSubmit();
        hideSpinner();

      } catch (err) {
        console.error(err);
        eventDetailsDiv.innerHTML = `<div class="alert alert-danger">Error loading event.</div>`;
        disableSubmit();
        hideSpinner();
      }
    }

    const fallbackImages = [
      "assets/images/event-1.svg",
      "assets/images/event-2.svg",
      "assets/images/event-3.svg"
    ];

    function renderEventCard(event) {
      const imageUrl = event.bannerUrl ?? fallbackImages[0];

      eventDetailsDiv.innerHTML = `
    <div class="card shadow-sm">
      <img src="${imageUrl}" class="card-img-top" alt="${event.name}">
      <div class="card-body">
        <h5 class="card-title">${event.name}</h5>
        <p class="card-text">${event.description}</p>
        <p class="text-muted small mb-0">
          <i class="fa fa-calendar me-2"></i>${event.startDate} · ${event.startTime}
        </p>
      </div>
    </div>
  `;
    }

    // ---------- FORM SUBMIT ----------
    registerForm.addEventListener("submit", async function (e) {
      e.preventDefault();

      if (!currentEventId) {
        showStatus("Error", "No valid event selected.", false);
        return;
      }

      const payload = {
        firstName: document.getElementById("firstName").value.trim(),
        lastName: document.getElementById("lastName").value.trim(),
        otherNames: document.getElementById("otherNames").value.trim(),
        email: document.getElementById("email").value.trim(),
        phoneNumber: document.getElementById("phone").value.trim(),
        church: document.getElementById("church").value.trim(),
        dateOfBirth: document.getElementById("dob").value,
        gender: mapGender(document.getElementById("gender").value),
        eventId: currentEventId
      };

      if(!payload.firstName || !payload.lastName  || !payload.phoneNumber || !payload.church || !payload.dateOfBirth || payload.gender === undefined) {
        showStatus("Validation Error", "Please fill in all required fields marked as (*)", false);
        return;
      }

      try {
        submitButton.disabled = true;
        showSubmitSpinner();

        const res = await fetch(REGISTRATION_API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        hideSubmitSpinner();

        if (!data.status) {
          showStatus("Registration Failed", data.message || "Unable to register.", false);
          submitButton.disabled = false;
          return;
        }

        showStatus("Success 🎉", "Your registration was successful!", true);
        registerForm.reset();
        submitButton.disabled = false;

      } catch (error) {
        hideSubmitSpinner();
        submitButton.disabled = false;
        showStatus("Error", "An unexpected error occurred.", false);
      }
    });

    // ---------- HELPERS ----------
    function mapGender(value) {
      if (value === "Male") return 0;
      if (value === "Female") return 1;
      return 0; // default fallback
    }

    function showStatus(title, message, success) {
      statusModalTitle.innerText = title;
      statusModalBody.innerHTML = `
    <div class="alert ${success ? "alert-success" : "alert-danger"} mb-0">
      ${message}
      <p style="padding-top:3px;"><i class="fa fa-whatsapp-square"></i>Join our <a href="https://chat.whatsapp.com/GrHfxM4WQGx381mAApq2wl?mode=gi_t" target="_blank">WhatsApp Group</a> chat via this link: </p>
    </div>
  `;
      statusModal.show();
    }

    // ---------- INIT ----------
    disableSubmit(); // disabled until event loads
    fetchEventDetails();
  </script>
</body>
