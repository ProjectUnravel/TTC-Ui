<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Photo Gallery — Today's Timothy</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>
.photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
  gap: 15px;
}

.photo-grid img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 6px;
  cursor: pointer;
}

/* Lightbox */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.lightbox img {
  max-width: 90%;
  max-height: 80vh;
  border-radius: 6px;
}

.lightbox-caption {
  color: #fff;
  text-align: center;
  margin-top: 10px;
}

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 25px;
  font-size: 30px;
  color: #fff;
  background: none;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-transparent py-3">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary" href="index.html">Today's timothy</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center position-relative">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" id="galleryDropdown" role="button" data-bs-toggle="dropdown">Gallery</a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item active" href="photo-gallery-catelogue.html">Photo Gallery</a></li>
            <li><a class="dropdown-item" href="video-gallery-catelogue.html">Video Gallery</a></li>
          </ul>
        </li>
        <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container my-5">
  <h1 id="eventTitle">Photo Gallery</h1>
  <p id="eventDescription" class="text-muted"></p>

  <div id="spinner" class="text-center my-4">
    <div class="spinner-border text-primary"></div>
  </div>

  <div class="photo-grid" id="photoGrid"></div>
</main>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" aria-hidden="true">
  <button class="lightbox-close" aria-label="Close">×</button>
  <div>
    <img class="lightbox-img" src="" alt="">
    <p class="lightbox-caption"></p>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const eventId = params.get("eventId");

const titleEl = document.getElementById("eventTitle");
const descEl = document.getElementById("eventDescription");
const grid = document.getElementById("photoGrid");
const spinner = document.getElementById("spinner");

const lightbox = document.getElementById("lightbox");
const lightboxImg = document.querySelector(".lightbox-img");
const lightboxCaption = document.querySelector(".lightbox-caption");
const lightboxClose = document.querySelector(".lightbox-close");

const fallbackImage = "assets/gallery-placeholder.jpg";

if (!eventId) {
  titleEl.textContent = "No Event Selected";
  spinner.style.display = "none";
  throw new Error("Missing eventId");
}

async function loadEvent() {
  const res = await fetch(`https://ttc-gateway.runasp.net/api/ttc/events/${eventId}`);
  const data = await res.json();
  titleEl.textContent = data.results.name;
  descEl.textContent = data.results.description || "";
}

async function loadGallery() {
  const res = await fetch(`https://ttc-gateway.runasp.net/api/ttc/events/gallery?eventId=${eventId}&mediaType=0`);
  const data = await res.json();

  spinner.style.display = "none";
  grid.innerHTML = "";

  if (!data.status || !data.results.length) {
    grid.innerHTML = "<p>No photos available for this event.</p>";
    return;
  }

  data.results.forEach((img, index) => {
    const imageUrl = img.imageUrl || fallbackImage;

    const figure = document.createElement("figure");
    const image = document.createElement("img");

    image.src = imageUrl;
    image.alt = "Event photo " + (index + 1);

    image.addEventListener("click", () => openLightbox(imageUrl, image.alt));

    figure.appendChild(image);
    grid.appendChild(figure);
  });
}

function openLightbox(src, caption) {
  lightboxImg.src = src;
  lightboxCaption.textContent = caption;
  lightbox.style.display = "flex";
}

lightboxClose.addEventListener("click", () => {
  lightbox.style.display = "none";
});

lightbox.addEventListener("click", e => {
  if (e.target === lightbox) {
    lightbox.style.display = "none";
  }
});

loadEvent();
loadGallery();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
